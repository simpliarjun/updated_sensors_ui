<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <title>Sensors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
      background: #fff;
      color: #000;
    }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .section { margin-bottom: 30px; }
    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .label { font-weight: 500; }
    .value {
      font-family: monospace;
      text-align: right;
      min-width: 100px;
    }
    .unit {
      font-size: 12px;
      color: #666;
      margin-left: 4px;
    }
    .status {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
      word-wrap: break-word;
    }
    .status.ok {
      background: #e6f7ed;
      color: #164b35;
    }
    .status.waiting {
      background: #fff7e6;
      color: #5d3a0a;
    }
    .status.error {
      background: #fde2e4;
      color: #ae1e1e;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <h1>Sensors</h1>
  <div id="status" class="status waiting">Loading...</div>
  <button id="btn" onclick="enableSensors()" style="display:none;">Enable Sensors</button>

  <div class="section">
    <h2>Accelerometer</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="ax">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="ay">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="az">0.000</span><span class="unit">m/s²</span></span></div>
  </div>

  <div class="section">
    <h2>Gyroscope</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="gx">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="gy">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="gz">0.000</span><span class="unit">°/s</span></span></div>
  </div>

  <div class="section">
    <h2>Orientation</h2>
    <div class="row"><span class="label">Alpha</span><span class="value"><span id="alpha">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Beta</span><span class="value"><span id="beta">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Gamma</span><span class="value"><span id="gamma">0.000</span><span class="unit">°</span></span></div>
  </div>

  <script>
    const el = {
      ax: document.getElementById('ax'),
      ay: document.getElementById('ay'),
      az: document.getElementById('az'),
      gx: document.getElementById('gx'),
      gy: document.getElementById('gy'),
      gz: document.getElementById('gz'),
      alpha: document.getElementById('alpha'),
      beta: document.getElementById('beta'),
      gamma: document.getElementById('gamma'),
      status: document.getElementById('status'),
      btn: document.getElementById('btn')
    };

    let hasData = false;

    function setStatus(text, type) {
      el.status.textContent = text;
      el.status.className = 'status ' + (type || 'waiting');
    }

    function handleMotion(e) {
      hasData = true;
      const acc = e.accelerationIncludingGravity;
      if (acc) {
        el.ax.textContent = (acc.x || 0).toFixed(3);
        el.ay.textContent = (acc.y || 0).toFixed(3);
        el.az.textContent = (acc.z || 0).toFixed(3);
      }

      const rot = e.rotationRate;
      if (rot) {
        el.gx.textContent = (rot.x || 0).toFixed(3);
        el.gy.textContent = (rot.y || 0).toFixed(3);
        el.gz.textContent = (rot.z || 0).toFixed(3);
      }

      setStatus('✓ Sensor Active', 'ok');
    }

    function handleOrientation(e) {
      hasData = true;
      el.alpha.textContent = (e.alpha || 0).toFixed(1);
      el.beta.textContent = (e.beta || 0).toFixed(1);
      el.gamma.textContent = (e.gamma || 0).toFixed(1);
      setStatus('✓ Sensor Active', 'ok');
    }

    function setupListeners() {
      window.addEventListener('devicemotion', handleMotion, false);
      window.addEventListener('deviceorientation', handleOrientation, false);
      el.btn.style.display = 'none';
      setStatus('Listening... move device', 'waiting');

      setTimeout(() => {
        if (!hasData) {
          setStatus('Move or rotate device', 'waiting');
        }
      }, 2000);
    }

    async function enableSensors() {
      const ua = navigator.userAgent;
      const isIOS = /iPad|iPhone|iPod/.test(ua);
      const isAndroid = /Android/.test(ua);

      setStatus('Requesting access...', 'waiting');

      if (isIOS && typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const motionPerm = await DeviceMotionEvent.requestPermission();
          const orientPerm = await DeviceOrientationEvent.requestPermission();

          if (motionPerm === 'granted' || orientPerm === 'granted') {
            setupListeners();
          } else {
            setStatus('Permission denied', 'error');
          }
        } catch (err) {
          setupListeners();
        }
      } else {
        setupListeners();
      }
    }

    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua);
    const isAndroid = /Android/.test(ua);

    if (isIOS || isAndroid) {
      if (isIOS && typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        el.btn.style.display = 'block';
        setStatus('Tap to enable sensors', 'waiting');
      } else {
        setStatus('Initializing...', 'waiting');
        setTimeout(enableSensors, 500);
      }
    } else {
      setStatus('Not a mobile device', 'error');
    }
  </script>
</body>
</html>
