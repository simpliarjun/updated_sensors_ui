<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
      background: #fff;
      color: #000;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .section {
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .label {
      font-weight: 500;
    }
    .value {
      font-family: monospace;
      text-align: right;
      min-width: 100px;
    }
    .unit {
      font-size: 12px;
      color: #666;
      margin-left: 4px;
    }
    .status {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
    }
    .status.ok {
      background: #e6f7ed;
      color: #164b35;
    }
    .status.waiting {
      background: #fff7e6;
      color: #5d3a0a;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <h1>Sensors</h1>
  <div id="status" class="status waiting">Requesting permission...</div>
  <button id="btn" onclick="request()" style="display:none;">Enable Sensors</button>

  <div class="section">
    <h2>Accelerometer</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="ax">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="ay">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="az">0.000</span><span class="unit">m/s²</span></span></div>
  </div>

  <div class="section">
    <h2>Gyroscope</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="gx">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="gy">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="gz">0.000</span><span class="unit">°/s</span></span></div>
  </div>

  <div class="section">
    <h2>Orientation</h2>
    <div class="row"><span class="label">Alpha</span><span class="value"><span id="alpha">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Beta</span><span class="value"><span id="beta">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Gamma</span><span class="value"><span id="gamma">0.000</span><span class="unit">°</span></span></div>
  </div>

  <script>
    const el = {
      ax: document.getElementById('ax'),
      ay: document.getElementById('ay'),
      az: document.getElementById('az'),
      gx: document.getElementById('gx'),
      gy: document.getElementById('gy'),
      gz: document.getElementById('gz'),
      alpha: document.getElementById('alpha'),
      beta: document.getElementById('beta'),
      gamma: document.getElementById('gamma'),
      status: document.getElementById('status'),
      btn: document.getElementById('btn')
    };

    let motionFired = false;
    let orientationFired = false;

    function setStatus(text, ok) {
      el.status.textContent = text;
      el.status.className = 'status ' + (ok ? 'ok' : 'waiting');
      console.log('[STATUS]', text, '(ok=' + ok + ')');
    }

    function handleMotion(e) {
      motionFired = true;
      console.log('[MOTION EVENT]', e);
      
      // Try accelerationIncludingGravity first (more common)
      let a = e.accelerationIncludingGravity;
      if (a && (a.x !== null || a.y !== null || a.z !== null)) {
        el.ax.textContent = (a.x || 0).toFixed(3);
        el.ay.textContent = (a.y || 0).toFixed(3);
        el.az.textContent = (a.z || 0).toFixed(3);
      }
      
      // Try regular acceleration (without gravity)
      let a2 = e.acceleration;
      if (a2 && a2.x !== null) {
        console.log('Also got acceleration:', a2);
      }
      
      // Get gyroscope data
      const r = e.rotationRate;
      if (r && (r.x !== null || r.y !== null || r.z !== null)) {
        el.gx.textContent = (r.x || 0).toFixed(3);
        el.gy.textContent = (r.y || 0).toFixed(3);
        el.gz.textContent = (r.z || 0).toFixed(3);
      }
      
      setStatus('✓ Active - Accelerometer & Gyroscope', true);
    }

    function handleOrientation(e) {
      orientationFired = true;
      console.log('[ORIENTATION EVENT]', e);
      
      el.alpha.textContent = (e.alpha || 0).toFixed(1);
      el.beta.textContent = (e.beta || 0).toFixed(1);
      el.gamma.textContent = (e.gamma || 0).toFixed(1);
      
      if (!motionFired) {
        setStatus('✓ Active - Compass/Orientation', true);
      }
    }

    async function request() {
      try {
        console.log('[INIT] Starting sensor initialization');
        console.log('[INFO] Current URL:', location.href);
        console.log('[INFO] Protocol:', location.protocol);
        
        // Check if running on HTTPS
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
          setStatus('❌ HTTPS Required', false);
          console.error('[ERROR] Not HTTPS. Protocol:', location.protocol);
          return;
        }

        // Add listeners FIRST before requesting permission
        console.log('[SETUP] Adding event listeners...');
        window.addEventListener('devicemotion', handleMotion, false);
        window.addEventListener('deviceorientation', handleOrientation, false);
        
        setStatus('📱 Requesting permissions...', false);
        
        // Request motion permission (iOS 13+)
        let motionPermissionAttempted = false;
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
          motionPermissionAttempted = true;
          try {
            console.log('[PERM] Requesting DeviceMotion permission...');
            const perm = await DeviceMotionEvent.requestPermission();
            console.log('[PERM] DeviceMotion result:', perm);
          } catch (e) {
            console.error('[PERM] Motion permission error:', e);
          }
        } else {
          console.log('[PERM] No DeviceMotion.requestPermission available (not iOS 13+)');
        }
        
        // Request orientation permission (iOS 13+)
        let orientPermissionAttempted = false;
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          orientPermissionAttempted = true;
          try {
            console.log('[PERM] Requesting DeviceOrientation permission...');
            const perm = await DeviceOrientationEvent.requestPermission();
            console.log('[PERM] DeviceOrientation result:', perm);
          } catch (e) {
            console.error('[PERM] Orientation permission error:', e);
          }
        } else {
          console.log('[PERM] No DeviceOrientation.requestPermission available');
        }
        
        setStatus('📡 Listening (move device)...', false);
        
        // Check at 1 second
        setTimeout(() => {
          console.log('[CHECK @ 1s] Motion:', motionFired, 'Orientation:', orientationFired);
          if (!motionFired && !orientationFired) {
            setStatus('⏳ Still listening... try rotating device', false);
          }
        }, 1000);

        // Check at 3 seconds
        setTimeout(() => {
          console.log('[CHECK @ 3s] Motion:', motionFired, 'Orientation:', orientationFired);
          if (!motionFired && !orientationFired) {
            setStatus('⏳ No data yet... try Settings > Safari > Motion & Orientation', false);
          }
        }, 3000);

        // Final check at 5 seconds
        setTimeout(() => {
          console.log('[CHECK @ 5s] Motion:', motionFired, 'Orientation:', orientationFired);
          if (!motionFired && !orientationFired) {
            setStatus('❌ No sensor data - Check iOS Settings or try reloading', false);
          }
        }, 5000);
        
        el.btn.style.display = 'none';
        
      } catch (e) {
        console.error('[ERROR]', e);
        setStatus('❌ ' + e.message, false);
      }
    }

    // Expose debugging functions
    window.debugSensors = () => {
      console.log('=== SENSOR DEBUG ===');
      console.log('Motion fired:', motionFired);
      console.log('Orientation fired:', orientationFired);
      console.log('DeviceMotionEvent:', typeof DeviceMotionEvent);
      console.log('DeviceMotionEvent.requestPermission:', typeof DeviceMotionEvent?.requestPermission);
      console.log('DeviceOrientationEvent:', typeof DeviceOrientationEvent);
      console.log('DeviceOrientationEvent.requestPermission:', typeof DeviceOrientationEvent?.requestPermission);
      console.log('User Agent:', navigator.userAgent);
    };

    // Initialize
    const ua = navigator.userAgent;
    console.log('[START] User Agent:', ua);
    
    if (/iPad|iPhone|iPod/.test(ua)) {
      console.log('[START] iOS detected - initializing sensors');
      setStatus('⏳ Initializing...', false);
      // Give Safari time to prepare
      setTimeout(() => request(), 500);
    } else {
      console.log('[START] Not iOS - showing manual button');
      el.btn.style.display = 'block';
      setStatus('ℹ Not on iOS', false);
    }
  </script>
</body>
</html>
