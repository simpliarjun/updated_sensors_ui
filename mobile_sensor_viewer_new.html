<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
      background: #fff;
      color: #000;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .section {
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .label {
      font-weight: 500;
    }
    .value {
      font-family: monospace;
      text-align: right;
      min-width: 100px;
    }
    .unit {
      font-size: 12px;
      color: #666;
      margin-left: 4px;
    }
    .status {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
      word-wrap: break-word;
    }
    .status.ok {
      background: #e6f7ed;
      color: #164b35;
    }
    .status.waiting {
      background: #fff7e6;
      color: #5d3a0a;
    }
    .status.error {
      background: #fde2e4;
      color: #ae1e1e;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button:hover {
      background: #333;
    }
    .debug {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 20px;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Sensors</h1>
  <div id="status" class="status waiting">Initializing...</div>
  <button id="btn" onclick="startSensors()">Start Sensors</button>

  <div class="section">
    <h2>Accelerometer</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="ax">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="ay">0.000</span><span class="unit">m/s²</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="az">0.000</span><span class="unit">m/s²</span></span></div>
  </div>

  <div class="section">
    <h2>Gyroscope</h2>
    <div class="row"><span class="label">X</span><span class="value"><span id="gx">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Y</span><span class="value"><span id="gy">0.000</span><span class="unit">°/s</span></span></div>
    <div class="row"><span class="label">Z</span><span class="value"><span id="gz">0.000</span><span class="unit">°/s</span></span></div>
  </div>

  <div class="section">
    <h2>Orientation</h2>
    <div class="row"><span class="label">Alpha</span><span class="value"><span id="alpha">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Beta</span><span class="value"><span id="beta">0.000</span><span class="unit">°</span></span></div>
    <div class="row"><span class="label">Gamma</span><span class="value"><span id="gamma">0.000</span><span class="unit">°</span></span></div>
  </div>

  <div class="debug">
    <div id="logs" style="line-height: 1.5;"></div>
  </div>

  <script>
    let logs = [];
    const logEl = document.getElementById('logs');

    function log(msg) {
      console.log(msg);
      logs.push(msg);
      if (logs.length > 20) logs.shift();
      logEl.innerHTML = logs.map(l => '<div>' + l + '</div>').join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    const el = {
      ax: document.getElementById('ax'),
      ay: document.getElementById('ay'),
      az: document.getElementById('az'),
      gx: document.getElementById('gx'),
      gy: document.getElementById('gy'),
      gz: document.getElementById('gz'),
      alpha: document.getElementById('alpha'),
      beta: document.getElementById('beta'),
      gamma: document.getElementById('gamma'),
      status: document.getElementById('status'),
      btn: document.getElementById('btn')
    };

    let eventsFired = 0;

    function updateStatus(text, type = 'waiting') {
      el.status.textContent = text;
      el.status.className = 'status ' + type;
      log('STATUS: ' + text);
    }

    function onDeviceMotion(event) {
      eventsFired++;
      log('✓ devicemotion event fired (#' + eventsFired + ')');
      
      const acc = event.accelerationIncludingGravity;
      if (acc) {
        el.ax.textContent = (acc.x || 0).toFixed(3);
        el.ay.textContent = (acc.y || 0).toFixed(3);
        el.az.textContent = (acc.z || 0).toFixed(3);
      }
      
      const rot = event.rotationRate;
      if (rot) {
        el.gx.textContent = (rot.x || 0).toFixed(3);
        el.gy.textContent = (rot.y || 0).toFixed(3);
        el.gz.textContent = (rot.z || 0).toFixed(3);
      }
      
      updateStatus('✓ Getting Accelerometer & Gyroscope Data', 'ok');
    }

    function onDeviceOrientation(event) {
      eventsFired++;
      log('✓ deviceorientation event fired (#' + eventsFired + ')');
      
      el.alpha.textContent = (event.alpha || 0).toFixed(1);
      el.beta.textContent = (event.beta || 0).toFixed(1);
      el.gamma.textContent = (event.gamma || 0).toFixed(1);
      
      if (eventsFired === 1) {
        updateStatus('✓ Getting Orientation Data', 'ok');
      }
    }

    async function startSensors() {
      log('--- START SENSOR REQUEST ---');
      log('URL: ' + location.href);
      log('Protocol: ' + location.protocol);
      
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        updateStatus('ERROR: Must be HTTPS', 'error');
        log('ERROR: Not HTTPS');
        return;
      }
      log('✓ HTTPS OK');

      log('Checking APIs...');
      if (typeof DeviceMotionEvent === 'undefined') {
        log('ERROR: DeviceMotionEvent not available');
      } else {
        log('✓ DeviceMotionEvent available');
      }
      if (typeof DeviceOrientationEvent === 'undefined') {
        log('ERROR: DeviceOrientationEvent not available');
      } else {
        log('✓ DeviceOrientationEvent available');
      }

      updateStatus('⏳ Requesting permissions...', 'waiting');
      
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        log('Requesting DeviceMotion permission...');
        try {
          const result = await DeviceMotionEvent.requestPermission();
          log('DeviceMotion permission: ' + result);
          if (result !== 'granted') {
            log('WARNING: Motion permission not granted');
          }
        } catch (err) {
          log('DeviceMotion error: ' + err.message);
        }
      } else {
        log('No requestPermission for DeviceMotion (auto-allowed on older iOS)');
      }

      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        log('Requesting DeviceOrientation permission...');
        try {
          const result = await DeviceOrientationEvent.requestPermission();
          log('DeviceOrientation permission: ' + result);
          if (result !== 'granted') {
            log('WARNING: Orientation permission not granted');
          }
        } catch (err) {
          log('DeviceOrientation error: ' + err.message);
        }
      } else {
        log('No requestPermission for DeviceOrientation (auto-allowed on older iOS)');
      }

      log('Adding event listeners...');
      window.addEventListener('devicemotion', onDeviceMotion, false);
      window.addEventListener('deviceorientation', onDeviceOrientation, false);
      
      log('Listeners added. Waiting for events...');
      updateStatus('📱 Listening... Move & rotate phone', 'waiting');
      el.btn.style.display = 'none';

      setTimeout(() => {
        if (eventsFired === 0) {
          log('--- NO EVENTS AT 2 SECONDS ---');
          updateStatus('⏳ No data yet... Try rotating phone', 'waiting');
        }
      }, 2000);

      setTimeout(() => {
        if (eventsFired === 0) {
          log('--- NO EVENTS AT 5 SECONDS ---');
          updateStatus('⚠️ Check: Settings > Safari > Motion & Orientation > ON', 'error');
        }
      }, 5000);
    }

    log('Page loaded');
    log('User Agent: ' + navigator.userAgent);
    
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      log('✓ iOS device detected');
      updateStatus('iOS Ready - Tap button to start', 'waiting');
      setTimeout(startSensors, 1000);
    } else {
      log('Not iOS - manual button needed');
      updateStatus('Not on iOS device', 'error');
    }
  </script>
</body>
</html>
